<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="siteTitle">Fotógrafo Profissional</title>
  <meta name="description" id="siteMeta" content="">
  <meta property="og:title" id="ogTitle" content="">
  <meta property="og:description" id="ogDesc" content="">
  <meta property="og:image" id="ogImage" content="">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/site/templates/shared.css">
  <link rel="stylesheet" href="/site/templates/galeria/css/style.css">
</head>
<body class="theme-galeria">

  <!-- NAV GALERIA (minimal, transparente) -->
  <nav class="nav-galeria">
    <div class="nav-container">
      <a href="#" class="logo" id="navLogo">Estúdio</a>
      <div class="nav-menu" id="navLinks"></div>
    </div>
  </nav>

  <!-- HERO GALERIA (imagem fullscreen com título sobreposto) -->
  <section id="section-hero" class="hero-galeria">
    <div id="heroTopBar" style="position:absolute;top:0;left:0;right:0;height:0;background:#000;z-index:4;pointer-events:none;"></div>
    <div class="hero-bg" id="heroBg"></div>
    <div id="heroBottomBar" style="position:absolute;bottom:0;left:0;right:0;height:0;background:#000;z-index:4;pointer-events:none;"></div>
    <div id="heroLayers" style="position:absolute;inset:0;z-index:5;pointer-events:none;"></div>
    <div class="hero-text" id="heroContent" style="display:none;">
      <h1 id="heroTitle">Eternizando Momentos</h1>
      <p id="heroSubtitle">Fotografia com alma e simplicidade</p>
    </div>
  </section>

  <!-- SOBRE (minimal, centralizado) -->
  <section id="section-sobre" class="section-sobre">
    <div class="sobre-container">
      <h2 id="sobreTitle">Sobre</h2>
      <p id="sobreText"></p>
      <img id="sobreImage" src="" alt="">
    </div>
  </section>

  <!-- PORTFOLIO (masonry grid Pinterest-style) -->
  <section id="section-portfolio" class="section-portfolio">
    <div class="portfolio-masonry" id="portfolioGrid"></div>
  </section>

  <!-- SERVIÇOS (minimal, lista simples) -->
  <section id="section-servicos" class="section-servicos">
    <div class="servicos-container">
      <h2 class="section-title">Serviços</h2>
      <div class="servicos-list" id="servicosGrid"></div>
    </div>
  </section>

  <!-- DEPOIMENTOS (minimal quotes) -->
  <section id="section-depoimentos" class="section-depoimentos">
    <div class="depoimentos-container">
      <h2 class="section-title">Depoimentos</h2>
      <div class="depoimentos-grid" id="depoimentosTrack"></div>
    </div>
  </section>

  <!-- CONTATO (minimal, centralizado) -->
  <section id="section-albuns" class="section-albuns section-padded">
    <div class="container">
      <div class="section-header">
        <h2 class="section-title">Álbuns</h2>
      </div>
      <div id="albumsGrid" class="albums-grid"></div>
    </div>
  </section>

  <section id="section-estudio" class="section-estudio section-padded">
    <div class="container">
      <div class="section-header">
        <h2 class="section-title" id="studioTitle">Nosso Estúdio</h2>
        <p class="section-subtitle" id="studioDesc"></p>
      </div>
      <div id="studioPhotosGrid" class="studio-grid"></div>
      <div id="studioInfo" class="studio-info"></div>
    </div>
  </section>

    <section id="section-faq" class="section-faq section-padded">
    <div class="container">
      <div class="section-header">
        <h2 class="section-title">Perguntas Frequentes</h2>
      </div>
      <div id="faqList" class="faq-list"></div>
    </div>
  </section>

  <section id="section-depoimento-form" class="section-depoimento-form section-padded">
    <div class="container">
      <div class="section-header">
        <h2 class="section-title">Deixe seu Depoimento</h2>
        <p class="section-subtitle">Sua experiência é muito importante para nós</p>
      </div>
      <form id="depoimentoForm" class="depoimento-form-public" style="max-width:540px;margin:0 auto;">
        <input type="text" name="name" placeholder="Seu nome" required>
        <textarea name="text" placeholder="Conte sua experiência..." rows="4" required></textarea>
        <input type="email" name="email" placeholder="Seu e-mail (não será publicado)" style="opacity:0.7;">
        <div style="display:flex;align-items:center;gap:0.5rem;">
          <label>Nota:</label>
          <select name="rating">
            <option value="5">⭐⭐⭐⭐⭐ (5)</option>
            <option value="4">⭐⭐⭐⭐ (4)</option>
            <option value="3">⭐⭐⭐ (3)</option>
            <option value="2">⭐⭐ (2)</option>
            <option value="1">⭐ (1)</option>
          </select>
        </div>
        <button type="submit" class="btn-primary">Enviar Depoimento</button>
        <p id="depoimentoFormMsg" style="display:none;margin-top:0.75rem;"></p>
      </form>
    </div>
  </section>

<section id="section-contato" class="section-contato">
    <div class="contato-container">
      <h2 id="contatoTitle">Contato</h2>
      <p id="contatoText"></p>
      <div class="contact-info" id="contatoInfo"></div>

      <form id="contactForm" class="contact-form">
        <input type="text" name="nome" placeholder="Nome" required>
        <input type="email" name="email" placeholder="Email" required>
        <textarea name="mensagem" placeholder="Mensagem" rows="5" required></textarea>
        <button type="submit">Enviar</button>
      </form>
    </div>
  </section>

  <!-- FOOTER GALERIA -->
  <footer id="siteFooter" class="footer-galeria">
    <div class="footer-content">
      <p id="footerLogo"></p>
      <div class="footer-social" id="footerSocial"></div>
      <p class="footer-copy" id="footerCopy">&copy; 2026. Todos os direitos reservados.</p>
    </div>
  </footer>

  <!-- LIGHTBOX -->
  <div id="portfolioLightbox" class="lightbox" style="display:none;">
    <button id="lbClose" class="lb-close">×</button>
    <button id="lbPrev" class="lb-arrow lb-prev">‹</button>
    <img id="lbImage" src="" alt="">
    <button id="lbNext" class="lb-arrow lb-next">›</button>
  </div>

  <script src="/site/templates/shared-site.js"></script>
</body>
</html>
