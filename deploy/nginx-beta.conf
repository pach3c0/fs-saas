# Nginx — CANARY/BETA do CliqueZoom.  Arquivo: /etc/nginx/sites-available/cliquezoom-beta
# Habilitar com:  ln -s /etc/nginx/sites-available/cliquezoom-beta /etc/nginx/sites-enabled/
# ⚠️ NUNCA deixe backups .bak dentro de sites-enabled/ (o Nginx lê tudo da pasta e dá conflito).
#
# Serve o domínio beta inteiro (raiz + wildcard), espelhando a estrutura multi-tenant da produção:
#   beta.cliquezoom.com.br            → app/admin (código novo)
#   <slug>.beta.cliquezoom.com.br     → site público + galeria do cliente daquele org (código novo)
# Tudo aponta pra instância beta em localhost:3052.

server {
    listen 80;
    server_name beta.cliquezoom.com.br *.beta.cliquezoom.com.br;

    # Certbot (HTTP-01) e redirect pra HTTPS são adicionados pelo `certbot --nginx`.
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name beta.cliquezoom.com.br *.beta.cliquezoom.com.br;

    # Preenchido pelo Certbot (cert wildcard *.beta.cliquezoom.com.br via DNS-01):
    # ssl_certificate     /etc/letsencrypt/live/beta.cliquezoom.com.br/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/beta.cliquezoom.com.br/privkey.pem;

    # Uploads de fotos: o Multer aceita até 10MB/arquivo — dar folga aqui (espelhar a prod).
    client_max_body_size 15M;

    location / {
        proxy_pass http://127.0.0.1:3052;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout 300s;
    }
}
